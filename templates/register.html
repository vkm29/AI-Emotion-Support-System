{% extends "base.html" %}

{% block title %}
Register | AI Emotion Support System
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6 col-md-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Join the AI Emotion Support System
                    </p>

                </div>

                <form method="POST">

                    <!-- Name -->

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <!-- Password -->

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Create password"
                            minlength="6"
                            required>

                    </div>

                    <!-- Confirm Password -->

                    <div class="mb-4">

                        <label class="form-label">

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="confirm"
                            placeholder="Confirm password"
                            minlength="6"
                            required>

                    </div>

                    <!-- Button -->

                    <div class="d-grid">

                        <button
                            class="btn btn-primary btn-lg">

                            <i class="bi bi-person-plus-fill"></i>

                            Register

                        </button>

                    </div>

                </form>

                <hr class="my-4">

                <div class="text-center">

                    Already have an account?

                    <a href="{{ url_for('auth.login') }}">

                        Login Here

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
